
name: 24/7 Pro Stream Bot & Debugger

# 👇 Yahan naye project ke liye run-name add kar diya gaya hai
run-name: "Stream Bot - Channel ${{ inputs.okru_stream_channel }}"

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target Stream URL'
        required: true
        type: string
        default: 'https://dadocric.st/player.php?id=starsp3&v=m'
      okru_stream_channel:
        description: 'OK.ru Broadcast Channel (1 to 8)' # 🚀 8 Keys Added Here
        required: true
        type: choice
        options: [ 
          '1', '1.1', '1.2', 
          '2', '2.1', '2.2', 
          '3', '3.1', '3.2', 
          '4', '4.1', '4.2', '4.3', '4.4', '4.5', 
          '5', '5.1', '5.2', '5.3', '5.4', '5.5', '5.6', '5.7', 
          's1-1', 's1-2', 's1-3', 's1-4', 's1-5', 's1-6', 's1-7', 's1-8', 's1-9', 's1-10', 
          's2-1', 's2-2', 's2-3', 's2-4', 's2-5', 's2-6', 's2-7', 's2-8', 's2-9', 's2-10' 
        ]
        default: '1'
      stream_quality:
        description: 'Internet Speed / Stream Quality'
        required: true
        type: choice
        options: [ '110KBps (Balanced 480p)' ]
        default: '110KBps (Balanced 480p)'

permissions:
  contents: write
  actions: write # 🚀 Yeh zaruri hai taake auto-overlap feature script se command chala sake

jobs:
  stream-and-record:
    runs-on: ubuntu-latest
    timeout-minutes: 360 # 6 Hours Limit

    steps:
    - name: Get Code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install FFmpeg, Virtual Display, & Audio Server
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg xvfb pulseaudio dbus-x11

    - name: Install NPM Packages
      run: npm install

    - name: Run Script (Live Broadcast + Debug Recording)
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # 🚀 Is ki base par Auto-overlap CLI authentication hogi
        TARGET_URL: ${{ github.event.inputs.target_url }}
        OKRU_STREAM_ID: ${{ github.event.inputs.okru_stream_channel }}
        STREAM_QUALITY: ${{ github.event.inputs.stream_quality }}
      run: |
        pulseaudio -D --exit-idle-time=-1
        pacmd load-module module-virtual-sink sink_name=v1
        pacmd set-default-sink v1
        pacmd set-default-source v1.monitor
        xvfb-run -s "-screen 0 1280x720x24 -ac" node stream.js

    # 🚀 MAGIC UPLOAD TO RELEASES (Run Even if Cancelled!)
    - name: Upload Debug Video to GitHub Releases
      if: always() 
      uses: softprops/action-gh-release@v1
      with:
        tag_name: "broadcast-${{ github.run_id }}"
        name: "Broadcast Debug Log - ${{ github.run_id }}"
        body: "First 30 seconds of the broadcast. Shows if the auto-clicker successfully bypassed ads."
        files: recording.mp4
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}






















