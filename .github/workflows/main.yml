name: Stream Clicker & Debug Recorder

on:
  workflow_dispatch:
    inputs:
      target_url:
        description: 'Target Stream URL to test'
        required: true
        type: string
        default: 'https://your-target-stream-link.com'

permissions:
  contents: write # Release create karne ke liye permission

jobs:
  record-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 10 

    steps:
    - name: Get Code
      uses: actions/checkout@v3

    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'

    - name: Install System Dependencies (For Virtual Display)
      run: |
        sudo apt-get update
        sudo apt-get install -y xvfb

    - name: Install Required Packages
      run: npm install puppeteer puppeteer-extra puppeteer-extra-plugin-stealth puppeteer-screen-recorder

    - name: Run Script & Record
      env:
        TARGET_URL: ${{ github.event.inputs.target_url }}
      # Agar user cancel kar de tab bhi script ko gracefully handle karne ke liye
      run: xvfb-run -s "-screen 0 1280x720x24 -ac" node debug-stream.js

    # 🚀 UPLOAD TO RELEASES (Run Even if Cancelled/Failed)
    - name: Upload Video to GitHub Releases
      if: always() # Yeh MAGIC step hai! Action cancel ho ya error aaye, yeh chale ga hi chale ga
      uses: softprops/action-gh-release@v1
      with:
        tag_name: "test-run-${{ github.run_id }}"
        name: "Debug Recording - ${{ github.run_id }}"
        body: "Here is the 30 sec (or partial) recording to debug the stream."
        files: recording.mp4
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
